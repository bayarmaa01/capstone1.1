version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      moodle:
        condition: service_started
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: 
      context: ./frontend
      target: production
    environment:
      REACT_APP_API_URL: /api
      REACT_APP_FACE_SERVICE_URL: /face
      NODE_ENV: production
    expose:
      - "80"
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build: 
      context: ./backend
      target: production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:secret@attendance-db:5432/attendance
      FACE_SERVICE_URL: http://attendance-face-service:5001
      MOODLE_URL: http://moodle/webservice/rest/server.php
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "4000"
    depends_on:
      attendance-db:
        condition: service_healthy
      moodle:
        condition: service_started
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  attendance-db:
    image: postgres:14-alpine
    container_name: attendance-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: attendance
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d attendance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  face-service:
    build: 
      context: ./face-service
      target: production
    container_name: attendance-face-service
    environment:
      MOODLE_URL: http://moodle:80
      MOODLE_WS_TOKEN: ${MOODLE_WS_TOKEN:-}
    expose:
      - "5001"
    volumes:
      - ./face-service/encodings:/app/encodings
      - ./face-service/logs:/app/logs
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ✅ FIXED MOODLE
  moodle:
    build: ./moodle-app
    container_name: moodle
    ports:
      - "8085:80"
    volumes:
      - moodledata:/var/www/moodledata
    depends_on:
      - moodle-db
    networks:
      - attendance-net
    restart: unless-stopped

  moodle-db:
    image: mariadb:10.6-alpine
    container_name: moodle-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    volumes:
      - moodledb:/var/lib/mysql
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  moodledb:
  moodledata:
  moodle_html:

networks:
  attendance-net:
    driver: bridge
