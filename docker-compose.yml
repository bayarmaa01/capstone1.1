services:

  nginx:
    image: nginx:latest
    container_name: attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  frontend:
    build: ./frontend
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_FACE_SERVICE_URL=/face
    expose:
      - "80"
    networks:
      - attendance-net
    restart: unless-stopped
    deploy:
      replicas: 2


  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://app:secret@attendance-db:5432/attendance
      FACE_SERVICE_URL: http://face-service:5001
      MOODLE_URL: http://moodle/webservice/rest/server.php
      MOODLE_TOKEN: ${MOODLE_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 4000
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
    expose:
      - "4000"
    depends_on:
      - attendance-db
      - face-service
    networks:
      - attendance-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3


  attendance-db:
    image: postgres:14
    container_name: attendance-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - attendance-net
    restart: unless-stopped


  face-service:
    build: ./face-service
    container_name: attendance-face-service
    expose:
      - "5001"
    volumes:
      - ./face-service/encodings:/app/encodings
    networks:
      - attendance-net
    restart: unless-stopped


  moodle:
    image: moodlehq/moodle-php-apache:8.2
    container_name: moodle
    environment:
      MOODLE_DATABASE_TYPE: mysqli
      MOODLE_DATABASE_HOST: moodle-db
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: moodlepass
      MOODLE_DATABASE_NAME: moodle
    volumes:
      - moodledata:/var/www/moodledata
    depends_on:
      - moodle-db
    expose:
      - "80"
    networks:
      - attendance-net
    restart: unless-stopped


  moodle-db:
    image: mariadb:10.6
    container_name: moodle-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    volumes:
      - moodledb:/var/lib/mysql
    networks:
      - attendance-net
    restart: unless-stopped


volumes:
  postgres_data:
  moodledb:
  moodledata:


networks:
  attendance-net:
    driver: bridge