services:
  # Blue Environment
  blue_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://blue_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    ports:
      - 4000:4000
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  blue_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      - blue_backend

  blue_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # Green Environment
  green_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://green_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  green_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      - green_backend

  green_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # AI Analytics Service
  analytics:
    build:
      context: ./ai-analytics
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  # Shared Services
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_DB=attendance
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d attendance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  moodle:
    build:
      context: ./moodle-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - moodle_data:/var/www/moodledata
    environment:
      - MOODLE_WWWROOT=http://40.90.174.78:8081
      - MOODLE_REVERSEPROXY=false
      - MOODLE_SSLPROXY=false
    networks:
      - app_network
    depends_on:
      moodle-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5

  moodle-db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=root_secret
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_secret
    volumes:
      - moodle_db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf
      - ./uploads:/uploads
      - ./backend/uploads:/app/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app_network
    depends_on:
      - blue_backend
      - blue_frontend
      - blue_face
      - green_backend
      - green_frontend
      - green_face
      - moodle
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - app_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - app_network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  moodle_db_data:
  moodle_data:
  prometheus_data:
  grafana_data:

networks:
  app_network:
    driver: bridge
