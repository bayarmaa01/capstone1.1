version: "3.9"

services:

  # 🌐 Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certs:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
      - moodle
    restart: unless-stopped

  # 💻 React Frontend
  frontend:
    build: ./frontend
    container_name: attendance-frontend
    environment:
      - REACT_APP_API_URL=/api
    expose:
      - "3000"
    restart: unless-stopped

  # ⚙️ Node Backend
  backend:
    build: ./backend
    container_name: attendance-backend
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/attendance
      FACE_SERVICE_URL: http://face-service:5001
      MOODLE_URL: http://moodle/webservice/rest/server.php
      MOODLE_TOKEN: 5d2f63b3c1f56fcb8ef11a723ea3e67d
      JWT_SECRET: supersecretkey
    expose:
      - "4000"
    depends_on:
      - db
    restart: unless-stopped

  # 🗄️ Attendance Database
  db:
    image: postgres:14
    container_name: attendance-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 🤖 Face Recognition Service
  face-service:
    build: ./face-service
    container_name: attendance-face-service
    expose:
      - "5001"
    volumes:
      - ./face-service/encodings:/app/encodings
    restart: unless-stopped

  # 🎓 Moodle LMS
  moodle:
    image: moodlehq/moodle-php-apache:8.2
    container_name: moodle
    environment:
      MOODLE_DATABASE_TYPE: mysqli
      MOODLE_DATABASE_HOST: moodle-db
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: moodlepass
      MOODLE_DATABASE_NAME: moodle
    volumes:
      - moodledata:/var/www/moodledata
    depends_on:
      - moodle-db
    expose:
      - "80"
    restart: unless-stopped

  # 🗄️ Moodle Database
  moodle-db:
    image: mariadb:10.6
    container_name: moodle-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    volumes:
      - moodledb:/var/lib/mysql
    restart: unless-stopped

volumes:
  postgres_data:
  moodledb:
  moodledata: