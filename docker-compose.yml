services:
  # Blue Environment
  blue_backend:
    image: bayarmaa/capstone1.1-backend:latest
    container_name: blue_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://face_upstream:5001
      - MOODLE_URL=http://moodle/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      - postgres
      - redis

  blue_frontend:
    image: bayarmaa/capstone1.1-frontend:latest
    container_name: blue_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost/api/
      - REACT_APP_FACE_API_URL=http://localhost/face/
      - REACT_APP_MOODLE_URL=http://localhost/moodle/
    networks:
      - app_network
    depends_on:
      - blue_backend

  blue_face:
    image: bayarmaa/capstone1.1-face-service:latest
    container_name: blue_face
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network

  # Green Environment
  green_backend:
    image: bayarmaa/capstone1.1-backend:latest
    container_name: green_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://face_upstream:5001
      - MOODLE_URL=http://moodle/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      - postgres
      - redis

  green_frontend:
    image: bayarmaa/capstone1.1-frontend:latest
    container_name: green_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost/api/
      - REACT_APP_FACE_API_URL=http://localhost/face/
      - REACT_APP_MOODLE_URL=http://localhost/moodle/
    networks:
      - app_network
    depends_on:
      - green_backend

  green_face:
    image: bayarmaa/capstone1.1-face-service:latest
    container_name: green_face
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network

  # Shared Services
  postgres:
    image: postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=attendance
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - app_network

  moodle:
    image: bitnami/moodle:latest
    container_name: moodle
    restart: unless-stopped
    environment:
      - MOODLE_DATABASE_HOST=moodle-db
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=moodle_secret
      - MOODLE_DATABASE_NAME=moodle
    networks:
      - app_network
    depends_on:
      - moodle-db

  moodle-db:
    image: mariadb:10.6
    container_name: moodle-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=root_secret
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_secret
    volumes:
      - moodle_db_data:/var/lib/mysql
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network
    depends_on:
      - blue_backend
      - blue_frontend
      - blue_face
      - green_backend
      - green_frontend
      - green_face
      - moodle

volumes:
  postgres_data:
  moodle_db_data:

networks:
  app_network:
    driver: bridge
