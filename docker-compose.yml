services:
  # Blue Environment
  blue_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://blue_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  blue_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      blue_backend:
        condition: service_healthy

  blue_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Green Environment
  green_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://green_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  green_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      green_backend:
        condition: service_healthy

  green_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Shared Services
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_DB=attendance
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d attendance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  moodle:
    build:
      context: ./moodle-app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MOODLE_WWWROOT=https://attendance-ml.duckdns.org/moodle
      - MOODLE_REVERSEPROXY=true
      - MOODLE_SSLPROXY=true
    networks:
      - app_network
    depends_on:
      moodle-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/moodle/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  moodle-db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=root_secret
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_secret
    volumes:
      - moodle_db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx.upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - app_network
    depends_on:
      blue_backend:
        condition: service_healthy
      blue_frontend:
        condition: service_started
      blue_face:
        condition: service_healthy
      green_backend:
        condition: service_healthy
      green_frontend:
        condition: service_started
      green_face:
        condition: service_healthy
      moodle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  moodle_db_data:

networks:
  app_network:
    driver: bridge
