global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend-blue'
    static_configs:
      - targets: ['blue_backend:4000']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'backend-green'
    static_configs:
      - targets: ['green_backend:4000']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'face-service-blue'
    static_configs:
      - targets: ['blue_face:5001']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'face-service-green'
    static_configs:
      - targets: ['green_face:5001']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
