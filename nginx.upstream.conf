# Dynamic upstream configuration for blue-green deployment
# This file is updated by deploy.sh during deployment

upstream backend_upstream {
    server blue_backend:4000;
    keepalive 32;
}

upstream frontend_upstream {
    server blue_frontend:80;
    keepalive 32;
}

upstream face_upstream {
    server blue_face:5001;
    keepalive 32;
}
