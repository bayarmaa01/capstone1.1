services:
  # Blue Environment
  blue_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blue_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://blue_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  blue_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: blue_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      - blue_backend

  blue_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: blue_face
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Green Environment
  green_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: green_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:secret@postgres:5432/attendance
      - FACE_SERVICE_URL=http://green_face:5001
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - REDIS_URL=redis://redis:6379
    networks:
      - app_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  green_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: green_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api/
      - REACT_APP_FACE_API_URL=/face/
      - REACT_APP_MOODLE_URL=/moodle/
    networks:
      - app_network
    depends_on:
      - green_backend

  green_face:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: green_face
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - MOODLE_URL=http://moodle:80/webservice/rest/server.php
      - UPLOAD_FOLDER=/app/uploads
      - ENCODINGS_FOLDER=/app/encodings
    volumes:
      - ./uploads:/app/uploads
      - ./encodings:/app/encodings
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Shared Services
  postgres:
    image: postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=attendance
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - app_network

  moodle:
    build:
      context: ./moodle-app
      dockerfile: Dockerfile
    container_name: moodle
    restart: unless-stopped
    environment:
      - MOODLE_WWWROOT=https://attendance-ml.duckdns.org/moodle
      - MOODLE_REVERSEPROXY=true
      - MOODLE_SSLPROXY=true
    ports:
      - "8080:80"
    networks:
      - app_network
    depends_on:
      - moodle-db

  moodle-db:
    image: mariadb:10.6
    container_name: moodle-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=root_secret
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_secret
    volumes:
      - moodle_db_data:/var/lib/mysql
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.fixed.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - app_network
    depends_on:
      - blue_backend
      - blue_frontend
      - blue_face
      - green_backend
      - green_frontend
      - green_face
      - moodle

volumes:
  postgres_data:
  moodle_db_data:

networks:
  app_network:
    driver: bridge
