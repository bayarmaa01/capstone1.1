groups:
  - name: backend.rules
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend service is down"
          description: "Backend service has been down for more than 30 seconds"
          runbook_url: "https://github.com/bayarmaa01/capstone1.1"

      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{job="backend",status=~"5.."}[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Backend high error rate"
          description: "Backend error rate is {{ $value }} errors per second"
          runbook_url: "https://github.com/bayarmaa01/capstone1.1"

      - alert: BackendSlowResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="backend"}[5m])) > 2
        for: 2m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Backend slow responses"
          description: "95th percentile response time is {{ $value }} seconds"
          runbook_url: "https://github.com/bayarmaa01/capstone1.1"
