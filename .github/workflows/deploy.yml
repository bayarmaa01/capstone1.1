name: 🚀 AI Attendance System CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_REPO: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
# --------------------------------------------------
# STEP 1 — TEST STAGE (PARALLEL)
# --------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    name: 🧪 Backend Tests
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run tests
        run: |
          cd backend
          npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance
          NODE_ENV: test

  test-frontend:
    runs-on: ubuntu-latest
    name: 🎨 Frontend Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run tests and build
        run: |
          cd frontend
          npm run test:ci
          npm run build
        env:
          CI: true

  test-face:
    runs-on: ubuntu-latest
    name: 🤖 Face Service Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: face-service/requirements.txt
      
      - name: Install dependencies
        run: |
          cd face-service
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd face-service
          python -m pytest tests/ --cov=. --cov-report=xml

# --------------------------------------------------
# STEP 2 — BUILD & PUSH STAGE
# --------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    name: 🐳 Build Backend
    needs: [test-backend, test-frontend, test-face]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}/attendance-backend:latest
            ${{ env.DOCKER_REPO }}/attendance-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-frontend:
    runs-on: ubuntu-latest
    name: 🐳 Build Frontend
    needs: [test-backend, test-frontend, test-face]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}/attendance-frontend:latest
            ${{ env.DOCKER_REPO }}/attendance-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-face:
    runs-on: ubuntu-latest
    name: 🐳 Build Face Service
    needs: [test-backend, test-frontend, test-face]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push face service image
        uses: docker/build-push-action@v4
        with:
          context: ./face-service
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}/attendance-face:latest
            ${{ env.DOCKER_REPO }}/attendance-face:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

# --------------------------------------------------
# STEP 3 — DEPLOY STAGE
# --------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to EC2
    needs: [build-backend, build-frontend, build-face]
    if: github.ref == 'refs/heads/main' && success()
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/automated-attendance-system
            
            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/attendance-face:latest
            
            # Stop existing containers
            docker-compose down
            
            # Update docker-compose with new image tags
            sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:.*|${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:latest|g" docker-compose.yml
            sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:.*|${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:latest|g" docker-compose.yml
            sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/attendance-face:.*|${{ secrets.DOCKERHUB_USERNAME }}/attendance-face:latest|g" docker-compose.yml
            
            # Start services
            docker-compose up -d
            
            # Wait for services to be healthy
            sleep 30
            
            # Check service health
            docker-compose ps
            
            # Clean up old images
            docker image prune -f
            
            echo "🚀 Deployment completed successfully!"
