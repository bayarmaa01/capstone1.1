name: 🚀 AI Attendance System CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1

jobs:

# -----------------------------
# 🧪 TEST STAGE (PARALLEL)
# -----------------------------
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance
          NODE_ENV: test

      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm run test:ci

  test-face-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd face-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd face-service
          python -m pytest tests/ -v --cov=app --cov-report=xml

# -----------------------------
# 🐳 BUILD STAGE (AFTER TESTS)
# -----------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-face-service:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./face-service
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------
# 🚀 DEPLOYMENT STAGE
# -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-face-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check server availability
        id: check_server
        run: |
          timeout 5 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22" \
            && echo "alive=true" >> $GITHUB_OUTPUT \
            || echo "alive=false" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        if: steps.check_server.outputs.alive == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/capstone1.1
            git pull origin main

            echo "🐳 Updating images"
            sed -i "s|image: .*-backend:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:latest|g" docker-compose.yml
            sed -i "s|image: .*-frontend:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:latest|g" docker-compose.yml
            sed -i "s|image: .*-face-service:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:latest|g" docker-compose.yml
            
            docker compose pull
            docker compose down
            docker compose up -d

            echo "🧹 Cleanup"
            docker image prune -f

            echo "⏱️ Waiting..."
            sleep 20

      - name: Skip deploy (server offline)
        if: steps.check_server.outputs.alive == 'false'
        run: echo "⚠️ Server is offline. Deployment skipped."

# -----------------------------
# 🏥 Health Check & Validation
# -----------------------------
  health-check:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for deployment to be ready
        run: sleep 60

      - name: Check backend health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/health")
          if [ "$response" != "200" ]; then
            echo "Backend health check failed with status: $response"
            exit 1
          fi
          echo "Backend health check passed"

      - name: Check face-service health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/face/health")
          if [ "$response" != "200" ]; then
            echo "Face-service health check failed with status: $response"
            exit 1
          fi
          echo "Face-service health check passed"

      - name: Check frontend accessibility
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/")
          if [ "$response" != "200" ]; then
            echo "Frontend accessibility check failed with status: $response"
            exit 1
          fi
          echo "Frontend accessibility check passed"

      - name: Notify deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Application is available at: ${{ secrets.PRODUCTION_URL }}"
