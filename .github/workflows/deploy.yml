name: 🚀 AI Attendance Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

# -----------------------------
# 🧪 Backend Test
# -----------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test

# -----------------------------
# 🐳 Build Docker Images
# -----------------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t attendance-backend ./backend

      - name: Build frontend image
        run: |
          docker build -t attendance-frontend ./frontend

# -----------------------------
# 🚀 Deploy to Azure VM
# -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: azureuser
          key: ${{ secrets.EC2_KEY }}
          script: |

            echo "📦 Updating project"

            cd ~/capstone1.1

            git pull origin main

            echo "🐳 Restarting Docker"

            docker compose down
            docker compose up -d --build

            echo "🧹 Cleaning old images"

            docker image prune -f

# -----------------------------
# 🏥 Health Check
# -----------------------------
  health-check:
    runs-on: ubuntu-latest
    needs: deploy

    steps:

      - name: Wait for service
        run: sleep 20

      - name: Check production site
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" ${{ secrets.PRODUCTION_URL }})

          if [ "$status" = "200" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi