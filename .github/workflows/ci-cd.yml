name: 🚀 Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1

jobs:

# -----------------------------
# 🧪 PARALLEL TEST STAGE
# -----------------------------
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance
          NODE_ENV: test

      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm run test:ci

  test-face-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd face-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd face-service
          python -m pytest tests/ -v --cov=app --cov-report=xml

# -----------------------------
# 🏗️ BUILD STAGE
# -----------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:latest
      image-sha: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:latest
      image-sha: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif

  build-face-service:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:latest
      image-sha: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./face-service
          push: false
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1-face-service:${{ github.sha }}
          format: sarif
          output: trivy-face-service-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-face-service-results.sarif

# -----------------------------
# 📦 PUSH STAGE
# -----------------------------
  push-images:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-face-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend images
        run: |
          docker push ${{ needs.build-backend.outputs.image-latest }}
          docker push ${{ needs.build-backend.outputs.image-sha }}

      - name: Push frontend images
        run: |
          docker push ${{ needs.build-frontend.outputs.image-latest }}
          docker push ${{ needs.build-frontend.outputs.image-sha }}

      - name: Push face-service images
        run: |
          docker push ${{ needs.build-face-service.outputs.image-latest }}
          docker push ${{ needs.build-face-service.outputs.image-sha }}

# -----------------------------
# 🚦 DEPLOYMENT STAGE (BLUE/GREEN)
# -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [push-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check server availability
        id: check_server
        continue-on-error: true
        run: |
          if timeout 5 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22"; then
            echo "alive=true" >> $GITHUB_OUTPUT
          else
            echo "alive=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug connection (non-blocking)
        continue-on-error: true
        run: |
          ping -c 2 ${{ secrets.EC2_HOST }} || true
          nc -zv ${{ secrets.EC2_HOST }} 22 || true

      - name: Deploy to EC2
        if: steps.check_server.outputs.alive == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e || true
            cd ~/capstone1.1 || exit 0

            git pull origin main || true

            # Detect active environment
            if docker ps --format "table {{.Names}}" | grep -q "blue"; then
              ACTIVE_ENV="blue"
              NEW_ENV="green"
            else
              ACTIVE_ENV="green"
              NEW_ENV="blue"
            fi

            echo "Active: $ACTIVE_ENV, Deploying to: $NEW_ENV"

            # Update docker-compose files with new images
            sed -i "s|image: .*-backend:.*|image: ${{ needs.build-backend.outputs.image-latest }}|g" docker-compose.${NEW_ENV}.yml
            sed -i "s|image: .*-frontend:.*|image: ${{ needs.build-frontend.outputs.image-latest }}|g" docker-compose.${NEW_ENV}.yml
            sed -i "s|image: .*-face-service:.*|image: ${{ needs.build-face-service.outputs.image-latest }}|g" docker-compose.${NEW_ENV}.yml

            # Deploy new environment
            docker compose -f docker-compose.${NEW_ENV}.yml up -d || true

            # Wait for health check
            sleep 30

            # Health check
            if curl -f http://localhost:8080/api/health; then
              echo "Health check passed"
              
              # Switch traffic
              sed -i "s|upstream backend {|upstream backend {\n    server ${NEW_ENV}_backend:5000;\n}|g" nginx.conf
              sed -i "s|upstream frontend {|upstream frontend {\n    server ${NEW_ENV}_frontend:3000;\n}|g" nginx.conf
              sed -i "s|upstream face-service {|upstream face-service {\n    server ${NEW_ENV}_face-service:5001;\n}|g" nginx.conf
              
              # Reload nginx
              docker exec nginx nginx -s reload || true
              
              echo "Traffic switched to $NEW_ENV"
              
              # Stop old environment
              docker compose -f docker-compose.${ACTIVE_ENV}.yml down || true
              
            else
              echo "Health check failed, rolling back"
              docker compose -f docker-compose.${NEW_ENV}.yml down || true
              exit 1
            fi

            # Cleanup
            docker image prune -f || true

      - name: Skip deploy (VM OFF)
        if: steps.check_server.outputs.alive == 'false'
        run: echo "⚠️ VM is OFF. Deployment skipped, pipeline continues."

# -----------------------------
# 🏥 HEALTH CHECK & VALIDATION
# -----------------------------
  health-check:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Wait for deployment to be ready
        run: sleep 60

      - name: Check backend health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Backend health check failed with status: $response"
            exit 1
          fi
          echo "Backend health check passed"

      - name: Check frontend health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status: $response"
            exit 1
          fi
          echo "Frontend health check passed"

      - name: Check face-service health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/face/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Face-service health check failed with status: $response"
            exit 1
          fi
          echo "Face-service health check passed"

      - name: Notify deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Application is available at: ${{ secrets.PRODUCTION_URL }}"

# -----------------------------
# 📊 MONITORING STACK
# -----------------------------
  setup-monitoring:
    runs-on: ubuntu-latest
    needs: [health-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy monitoring stack
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/capstone1.1 || exit 0
            
            # Deploy monitoring stack
            docker compose -f docker-compose.monitoring.yml up -d || true
            
            echo "Monitoring stack deployed"
            echo "Prometheus: http://${{ secrets.PRODUCTION_URL }}:9090"
            echo "Grafana: http://${{ secrets.PRODUCTION_URL }}:3001"
            echo "Loki: http://${{ secrets.PRODUCTION_URL }}:3100"

# -----------------------------
# 🚨 ALERTING
# -----------------------------
  alerting:
    runs-on: ubuntu-latest
    needs: [setup-monitoring]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Send alert notification
        continue-on-error: true
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 Deployment Failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Alert failed"

# -----------------------------
# 🧹 CLEANUP
# -----------------------------
  cleanup:
    runs-on: ubuntu-latest
    needs: [alerting]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Cleanup old Docker images
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/capstone1.1 || exit 0
            
            # Keep only latest 5 images
            docker images --format "table {{.Repository}}:{{.Tag}}" | grep "capstone1.1" | tail -n +6 | awk '{print $1":"$2}' | xargs -r docker rmi || true
            
            echo "Cleanup completed"
