name: 🚀 Production CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1

jobs:

# -----------------------------
# 🧪 PARALLEL TEST STAGE
# -----------------------------
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance
          NODE_ENV: test

      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm run test:ci

  test-face-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd face-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd face-service
          python -m pytest tests/ -v --cov=app --cov-report=xml

# -----------------------------
# 🏗️ PARALLEL BUILD & SCAN STAGE
# -----------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
      image-sha: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          scanners: vuln

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
      image-sha: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          scanners: vuln

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-face-service:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service]
    
    outputs:
      image-latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:latest
      image-sha: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: ./face-service
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}-face-service:${{ github.sha }}
          format: sarif
          output: trivy-face-service-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          scanners: vuln

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-face-service-results.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./face-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-face-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------
# 🚀 DEPLOYMENT STAGE (OPTIONAL)
# -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-face-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check server availability
        id: check_server
        continue-on-error: true
        run: |
          if timeout 5 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22"; then
            echo "alive=true" >> $GITHUB_OUTPUT
          else
            echo "alive=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: steps.check_server.outputs.alive == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e || true
            cd ~/capstone1.1 || exit 0

            git pull origin main || true

            echo "🐳 Updating docker-compose with new images"
            sed -i "s|image: .*-backend:.*|image: ${{ needs.build-backend.outputs.image-latest }}|g" docker-compose.yml
            sed -i "s|image: .*-frontend:.*|image: ${{ needs.build-frontend.outputs.image-latest }}|g" docker-compose.yml
            sed -i "s|image: .*-face-service:.*|image: ${{ needs.build-face-service.outputs.image-latest }}|g" docker-compose.yml

            echo "🚀 Pulling new images and restarting services"
            docker compose pull || true
            docker compose down || true
            docker compose up -d || true

            echo "🧹 Cleaning old images"
            docker image prune -f || true

      - name: Skip deploy (VM OFF)
        if: steps.check_server.outputs.alive == 'false'
        run: echo "⚠️ VM is OFF. Deployment skipped, pipeline continues."

# -----------------------------
# 🏥 HEALTH CHECK & VALIDATION
# -----------------------------
  health-check:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Wait for deployment to be ready
        run: sleep 60

      - name: Check backend health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Backend health check failed with status: $response"
            exit 1
          fi
          echo "Backend health check passed"

      - name: Check frontend health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status: $response"
            exit 1
          fi
          echo "Frontend health check passed"

      - name: Check face-service health
        continue-on-error: true
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/face/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Face-service health check failed with status: $response"
            exit 1
          fi
          echo "Face-service health check passed"

      - name: Notify deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Application is available at: ${{ secrets.PRODUCTION_URL }}"
