name: 🚀 Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/capstone1.1

jobs:

# -----------------------------
# 🧪 PARALLEL TEST STAGE
# -----------------------------
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance
          NODE_ENV: test

      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_attendance

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm run test:ci

  test-face-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd face-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd face-service
          python -m pytest tests/ -v --cov=app --cov-report=xml

# -----------------------------
# 🔍 CHANGE DETECTION
# -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      face-service: ${{ steps.changes.outputs.face-service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            face-service:
              - 'face-service/**'

# -----------------------------
# 🏗️ MATRIX BUILD & SCAN STAGE
# -----------------------------
  build-and-scan:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-face-service, changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs['face-service'] == 'true'
    strategy:
      matrix:
        service: [backend, frontend, face-service]
        include:
          - service: backend
            context: ./backend
            port: 5000
          - service: frontend
            context: ./frontend
            port: 3000
          - service: face-service
            context: ./face-service
            port: 5001
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          scanners: vuln

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}-results.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------
# 🚀 BLUE/GREEN DEPLOYMENT
# -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check server availability
        id: check_server
        continue-on-error: true
        run: |
          if timeout 5 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22"; then
            echo "alive=true" >> $GITHUB_OUTPUT
          else
            echo "alive=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: steps.check_server.outputs.alive == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e || true
            cd ~/capstone1.1 || exit 0

            git pull origin main || true

            echo "🚀 Starting Blue/Green deployment"
            chmod +x deploy.sh
            ./deploy.sh

      - name: Skip deploy (VM OFF)
        if: steps.check_server.outputs.alive == 'false'
        run: echo "⚠️ VM is OFF. Deployment skipped, pipeline continues."

# -----------------------------
# 📊 MONITORING SETUP
# -----------------------------
  setup-monitoring:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy monitoring stack
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/capstone1.1 || exit 0
            
            docker compose -f docker-compose.monitoring.yml up -d || true
            
            echo "📊 Monitoring stack deployed"
            echo "Prometheus: http://${{ secrets.PRODUCTION_URL }}:9090"
            echo "Grafana: http://${{ secrets.PRODUCTION_URL }}:3001"
            echo "Loki: http://${{ secrets.PRODUCTION_URL }}:3100"

# -----------------------------
# 🚨 ALERTING
# -----------------------------
  alerting:
    runs-on: ubuntu-latest
    needs: [setup-monitoring]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Send alert notification
        continue-on-error: true
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 Deployment Failed! Repository: ${{ github.repository }} Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Alert failed"

# -----------------------------
# 🧹 CLEANUP
# -----------------------------
  cleanup:
    runs-on: ubuntu-latest
    needs: [alerting]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Cleanup old Docker images
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/capstone1.1 || exit 0
            
            docker images --format "table {{.Repository}}:{{.Tag}}" | grep "capstone1.1" | tail -n +6 | awk '{print $1":"$2}' | xargs -r docker rmi || true
            
            echo "🧹 Cleanup completed"
