# Production Nginx Configuration with SSL
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Docker DNS
    resolver 127.0.0.11 valid=10s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=face:10m rate=5r/s;

    upstream frontend {
        server blue_frontend:80;
        keepalive 32;
    }

    upstream backend {
        server blue_backend:4000;
        keepalive 32;
    }

    upstream face_upstream {
        server blue_face:5001;
        keepalive 16;
    }

    upstream frontend_service {
        server blue_frontend:3000;
        server green_frontend:3000;
        keepalive 16;
    }

    upstream analytics_upstream {
        server analytics:5002;
    }

    upstream moodle_upstream {
        server capstone11-moodle-1:80;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name attendance-ml.duckdns.org;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server with SSL
    server {
        listen 443 ssl;
        server_name attendance-ml.duckdns.org;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;
        
        # SSL Security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Security Headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

        # Rate limiting
        limit_req_status 429;
        limit_req_log_level warn;

        # Backend API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Face recognition service
        location /face/ {
            limit_req zone=face burst=10 nodelay;
            proxy_pass http://face_service;
            
            proxy_pass http://face_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Larger timeouts for face processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # File upload settings
            client_max_body_size 10M;
            proxy_request_buffering off;
        }

        # Uploads directory
        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Moodle proxy
        location /moodle/ {
            proxy_pass http://moodle_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
