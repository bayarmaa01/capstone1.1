# Clean, Stable Nginx Configuration for Demo
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # 🔥 Docker DNS
    resolver 127.0.0.11 valid=10s;

    upstream frontend {
        server blue_frontend:3000;
    }

    upstream backend {
        server blue_backend:4000;
    }

    upstream face_upstream {
        server blue_face:5001;
    }

    upstream analytics_upstream {
        server analytics:5002;
    }

    upstream moodle_upstream {
        server moodle:80;
    }

    server {
        listen 80;
        server_name attendance-ml.duckdns.org;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name attendance-ml.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://frontend;
        }

        location /api/ {
            proxy_pass http://backend;
        }

        location /uploads/ {
            proxy_pass http://backend/uploads/;
        }
    }
}
