upstream backend_api {
    server backend:4000;
}

upstream face_service {
    server attendance-face-service:5001;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name attendance-ml.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name attendance-ml.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;

    # 🔥 API (FIXED CORRECTLY)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # FACE
    location /face/ {
        proxy_pass http://face_service/;
    }

    # FRONTEND
    location / {
        proxy_pass http://frontend_app;
    }
}
