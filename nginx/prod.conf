# Nginx configuration for blue-green deployment
# This file is used by switch.sh to toggle between blue/green environments

upstream backend_api {
    server blue_backend:4000;
    keepalive 32;
}

upstream face_service {
    server blue_face:5001;
    keepalive 16;
}

upstream frontend_app {
    server blue_frontend:80;
    keepalive 32;
}

# Set active backend (will be modified by switch.sh)
set $active_backend blue_backend;

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name attendance-ml.duckdns.org;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server with blue-green switching
server {
    listen 443 ssl http2;
    server_name attendance-ml.duckdns.org;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;
    
    # SSL Security Headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' http://attendance-ml.duckdns.org;" always;
    
    # API backend with rate limiting
    location /api/ {
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        
        # Dynamic backend selection based on $active_backend variable
        if ($active_backend = blue_backend) {
            proxy_pass http://blue_backend:4000;
        }
        if ($active_backend = green_backend) {
            proxy_pass http://green_backend:4000;
        }
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Face recognition service with stricter rate limiting
    location /face/ {
        limit_req_zone $binary_remote_addr zone=face:10m rate=5r/s;
        
        # Dynamic backend selection based on $active_backend variable
        if ($active_backend = blue_backend) {
            proxy_pass http://blue_face:5001;
        }
        if ($active_backend = green_backend) {
            proxy_pass http://green_face:5001;
        }
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Larger timeouts for face processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # File upload settings
        client_max_body_size 10M;
        proxy_request_buffering off;
    }

    # Frontend application
    location / {
        # Dynamic backend selection based on $active_backend variable
        if ($active_backend = blue_backend) {
            proxy_pass http://blue_frontend:80;
        }
        if ($active_backend = green_backend) {
            proxy_pass http://green_frontend:80;
        }
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Cache static assets with longer TTL
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
            try_files $uri @frontend;
        }
        
        # Handle manifest.json and PWA files
        location ~* \.(manifest\.json|service-worker\.js)$ {
            expires 1h;
            add_header Cache-Control "public";
            add_header Content-Type application/json;
            try_files $uri @frontend;
        }
        
        # Handle uploads directory
        location /uploads/ {
            proxy_pass http://backend_api/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache uploaded images
            location ~* \.(jpg|jpeg|png|gif)$ {
                expires 30d;
                add_header Cache-Control "public";
                add_header X-Content-Type-Options nosniff;
            }
        }
    }
    
    # Fallback to frontend for SPA routing
    location @frontend {
        # Dynamic backend selection based on $active_backend variable
        if ($active_backend = blue_backend) {
            proxy_pass http://blue_frontend:80;
        }
        if ($active_backend = green_backend) {
            proxy_pass http://green_frontend:80;
        }
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Security: Hide server version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;
}
