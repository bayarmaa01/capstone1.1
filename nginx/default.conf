limit_req_zone $remote_addr zone=api:10m rate=100r/s;
limit_req_zone $remote_addr zone=face:10m rate=50r/s;
upstream backend_api {
    server blue_backend:4000;
    keepalive 32;
}
upstream face_service {
    server blue_face:5001;
    keepalive 16;
}
upstream frontend_service {
    server blue_frontend:80;
    keepalive 16;
}
server {
    listen 80;
    server_name attendance-ml.duckdns.org;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name attendance-ml.duckdns.org;
    ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/face/ {
        limit_req zone=face burst=10 nodelay;
        proxy_pass http://blue_face:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
    location /face/ {
        limit_req zone=face burst=10 nodelay;
        proxy_pass http://face_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
    location /moodle/ {
        proxy_pass http://moodle:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /uploads/ {
        proxy_pass http://backend_api/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Nginx metrics for monitoring
    location /stub_status {
        stub_status;
        allow all;
        access_log off;
    }
    location / {
        proxy_pass http://frontend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
