server {
    listen 80;
    server_name attendance-ml.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name attendance-ml.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/attendance-ml.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance-ml.duckdns.org/privkey.pem;

    # API
    location /api/ {
        proxy_pass http://blue_backend:4000;
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://blue_backend:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Face service
    location /face/ {
        proxy_pass http://blue_face:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
        proxy_pass http://blue_frontend:80;
        proxy_set_header Host $host;
    }

    # Moodle
    location /moodle/ {
        proxy_pass http://moodle:80/;
        proxy_set_header Host $host;
    }

    # Health
    location /health {
        return 200 "healthy";
    }
}
